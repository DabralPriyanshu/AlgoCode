<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Hello world</h1>
    <button id="btn">Click me</button>
    <button id="connectionBtn">Fetch connection Id:</button>
    <div id="connectionResponse"></div>

    <div id="submissionResponse"></div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
      const socket = io("http://localhost:3003");
      socket.on("connect", () => {
        console.log("Connected to server");
      });
      document.getElementById("btn").addEventListener("click", (e) => {
        socket.emit("setUserId", "123");
      });
      document
        .getElementById("connectionBtn")
        .addEventListener("click", (e) => {
          socket.emit("getConnectionId", "123");
        });

      socket.on("connectionId", (connId) => {
        console.log(connId);
        document.getElementById("connectionResponse").textContent = connId;
      });
      socket.on("submissionPayloadResponse", (data) => {
        document.getElementById("submissionResponse").textContent =
          JSON.stringify(data);
      });

      socket.on("disconnect", () => {
        console.log("Disconnected to server");
      });
    </script>
  </body>
</html>
